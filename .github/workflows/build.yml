name: AKRO DTBO Patcher (75Hz)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        sudo apt-get update -y
        sudo apt-get install -y device-tree-compiler python3 wget
        wget -q https://raw.githubusercontent.com/LineageOS/android_system_libufdt/master/utils/src/mkdtboimg.py
        chmod +x mkdtboimg.py

    - name: Unpack dtbo.img
      run: |
        mkdir -p workspace
        cp dtbo.img workspace/
        cd workspace
        python3 ../mkdtboimg.py dump dtbo.img -b dtb > dump.txt

    - name: Decompile and Inject 75Hz
      run: |
        cd workspace
        for file in dtb.*; do
          if [ -f "$file" ]; then
            # Try to decompile, skip if it fails
            dtc -I dtb -O dts -o "${file}.dts" "$file" 2>/dev/null || continue

            # High precision replacement for 75Hz (Dec: 75, Hex: 0x4b)
            sed -i -E 's/([a-zA-Z0-9_-]*panel-framerate[a-zA-Z0-9_-]*\s*=\s*<)[0-9]+(>)/\175\2/g' "${file}.dts"
            sed -i -E 's/([a-zA-Z0-9_-]*panel-framerate[a-zA-Z0-9_-]*\s*=\s*<0x)[0-9a-fA-F]+(>)/\14b\2/g' "${file}.dts"

            sed -i -E 's/([a-zA-Z0-9_-]*fps[a-zA-Z0-9_-]*\s*=\s*<)[0-9]+(>)/\175\2/g' "${file}.dts"
            sed -i -E 's/([a-zA-Z0-9_-]*fps[a-zA-Z0-9_-]*\s*=\s*<0x)[0-9a-fA-F]+(>)/\14b\2/g' "${file}.dts"

            # Recompile to dtb
            dtc -I dts -O dtb -o "$file" "${file}.dts" 2>/dev/null || true
          fi
        done

    - name: Repack dtbo.img
      run: |
        cat << 'EOF' > repack.py
        import os

        def get_val(line):
            if ':' in line:
                parts = line.split(':')
                if len(parts) > 1:
                    return parts[1].strip()
            return None

        with open('workspace/dump.txt', 'r') as f:
            lines = f.readlines()

        cmd = ["python3", "mkdtboimg.py", "create", "dtbo-patched.img"]
        
        for line in lines:
            line = line.strip()
            if line.startswith("dt_table_entry"):
                idx = line.split("[")[1].split("]")[0]
                cmd.append(f"workspace/dtb.{idx}")
            else:
                val = get_val(line)
                if val is not None and val != "":
                    if "id :" in line: cmd.append(f"--id={val}")
                    elif "rev :" in line: cmd.append(f"--rev={val}")
                    elif "custom[0]" in line: cmd.append(f"--custom0={val}")
                    elif "custom[1]" in line: cmd.append(f"--custom1={val}")
                    elif "custom[2]" in line: cmd.append(f"--custom2={val}")
                    elif "custom[3]" in line: cmd.append(f"--custom3={val}")

        print(f"Executing: {' '.join(cmd)}")
        os.system(" ".join(cmd))
        EOF
        python3 repack.py

    - name: Upload Patched Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DTBO-75Hz-Patched
        path: dtbo-patched.img
